name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  QT_VERSION: 6.11.1
  APP_NAME: PP18_VideoTools

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Configure
        run: |
          cmake -S . -B build/ci-macos-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build/ci-macos-arm64 --config Release

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build/ci-win-x64 -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build/ci-win-x64 --config Release
