name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: 6.8.3
  APP_NAME: PP18_VideoTools

jobs:
  package-macos:
    name: Package macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Qt
        run: |
          python -m pip install "aqtinstall==3.3.*"
          python -m aqt install-qt mac desktop "${QT_VERSION}" clang_64 \
            --outputdir "${GITHUB_WORKSPACE}/Qt" \
            --archives qtbase qtdeclarative \
            --modules qtmultimedia qtshadertools
          echo "QT_DIR=${GITHUB_WORKSPACE}/Qt/${QT_VERSION}/macos" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/Qt/${QT_VERSION}/macos/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          cmake -S . -B release/${APP_NAME}_macos-arm64 -G Ninja \
            -DCMAKE_PREFIX_PATH="${QT_DIR}/lib/cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build release/${APP_NAME}_macos-arm64 --config Release

      - name: Deploy Qt runtime
        run: |
          macdeployqt "release/${APP_NAME}_macos-arm64/${APP_NAME}.app" \
            -qmldir="${GITHUB_WORKSPACE}/src/qml" \
            -verbose=1
          test -f "release/${APP_NAME}_macos-arm64/${APP_NAME}.app/Contents/Resources/qml/QtQuick/Controls/libqtquickcontrols2plugin.dylib"

      - name: Ad-hoc sign macOS app bundle
        run: |
          codesign --force --deep --sign - "release/${APP_NAME}_macos-arm64/${APP_NAME}.app"
          codesign --verify --deep --strict --verbose=4 "release/${APP_NAME}_macos-arm64/${APP_NAME}.app"

      - name: Create package
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "release/${APP_NAME}_macos-arm64/${APP_NAME}.app" \
            "dist/${APP_NAME}_macos-arm64_${GITHUB_REF_NAME}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_macos-arm64_${{ github.ref_name }}
          path: dist/${{ env.APP_NAME }}_macos-arm64_${{ github.ref_name }}.zip
          if-no-files-found: error

  package-windows:
    name: Package Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install "aqtinstall==3.3.*"
          python -m aqt install-qt windows desktop "${env:QT_VERSION}" win64_msvc2022_64 `
            --outputdir "${env:GITHUB_WORKSPACE}\Qt" `
            --archives qtbase qtdeclarative `
            --modules qtmultimedia qtshadertools
          $qtDir = "${env:GITHUB_WORKSPACE}\Qt\${env:QT_VERSION}\msvc2022_64"
          "QT_DIR=$qtDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$qtDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B release/${env:APP_NAME}_win-x64 -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${env:QT_DIR}\lib\cmake"

      - name: Build
        shell: pwsh
        run: cmake --build release/${env:APP_NAME}_win-x64 --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $buildOutput = "release/${env:APP_NAME}_win-x64/Release"
          $exe = "$buildOutput/${env:APP_NAME}.exe"
          $windeployqt = "${env:QT_DIR}\bin\windeployqt.exe"

          & $windeployqt --release --compiler-runtime --no-translations --qmldir "${env:GITHUB_WORKSPACE}\src\qml" $exe

          if (-not (Test-Path "$buildOutput\qml\QtQuick\Controls\qtquickcontrols2plugin.dll")) {
            throw "QtQuick.Controls QML plugin was not deployed."
          }

          $crtCandidates = @()
          if ($env:VCToolsRedistDir) {
            $crtCandidates += Join-Path $env:VCToolsRedistDir "x64\Microsoft.VC143.CRT"
            $crtCandidates += Join-Path $env:VCToolsRedistDir "x64\Microsoft.VC142.CRT"
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            if (-not [string]::IsNullOrWhiteSpace($vsInstall)) {
              $redistRoot = Join-Path $vsInstall "VC\Redist\MSVC"
              if (Test-Path $redistRoot) {
                $crtCandidates += Get-ChildItem $redistRoot -Directory |
                  ForEach-Object { Get-ChildItem (Join-Path $_.FullName "x64") -Directory -Filter "Microsoft.VC*.CRT" -ErrorAction SilentlyContinue } |
                  Select-Object -ExpandProperty FullName
              }
            }
          }

          $crtCandidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique |
            ForEach-Object { Copy-Item -Path "$_\*.dll" -Destination $buildOutput -Force }

          if (-not (Test-Path "$buildOutput\vcruntime140.dll")) {
            throw "MSVC runtime DLLs were not deployed."
          }

      - name: Create package
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }

          $buildOutput = "release/${env:APP_NAME}_win-x64/Release"
          $stage = "dist/${env:APP_NAME}_win-x64_$tag"
          $zip = "dist/${env:APP_NAME}_win-x64_$tag.zip"

          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path "$buildOutput/*" -Destination $stage -Recurse -Force
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_win-x64_${{ github.ref_name }}
          path: dist/${{ env.APP_NAME }}_win-x64_${{ github.ref_name }}.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-macos
      - package-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes "Automated build for $TAG"
          fi

          find dist -type f -name "*.zip" -print0 | while IFS= read -r -d '' asset; do
            gh release upload "$TAG" "$asset" --repo "$REPO" --clobber
          done
