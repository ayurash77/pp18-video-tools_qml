name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: 6.11.0
  APP_NAME: PP18_VideoTools

jobs:
  package-macos:
    name: Package macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia
          cache: true

      - name: Configure
        run: |
          cmake -S . -B release/${APP_NAME}_macos-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build release/${APP_NAME}_macos-arm64 --config Release

      - name: Deploy Qt runtime
        run: macdeployqt "release/${APP_NAME}_macos-arm64/${APP_NAME}.app" -verbose=1

      - name: Create package
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "release/${APP_NAME}_macos-arm64/${APP_NAME}.app" \
            "dist/${APP_NAME}_macos-arm64_${GITHUB_REF_NAME}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_macos-arm64_${{ github.ref_name }}
          path: dist/${{ env.APP_NAME }}_macos-arm64_${{ github.ref_name }}.zip
          if-no-files-found: error

  package-windows:
    name: Package Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B release/${env:APP_NAME}_win-x64 -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build release/${env:APP_NAME}_win-x64 --config Release

      - name: Create package
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }

          $buildOutput = "release/${env:APP_NAME}_win-x64/Release"
          $stage = "dist/${env:APP_NAME}_win-x64_$tag"
          $zip = "dist/${env:APP_NAME}_win-x64_$tag.zip"

          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path "$buildOutput/*" -Destination $stage -Recurse -Force
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_win-x64_${{ github.ref_name }}
          path: dist/${{ env.APP_NAME }}_win-x64_${{ github.ref_name }}.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-macos
      - package-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Automated build for $TAG"
          fi

          find dist -type f -name "*.zip" -print0 | while IFS= read -r -d '' asset; do
            gh release upload "$TAG" "$asset" --clobber
          done
